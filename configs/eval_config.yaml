evaluation:
  golden_examples: data/golden_examples_quick.json
  metrics:
    - faithfulness
    - answer_relevancy
    - context_recall
  thresholds:
    faithfulness: 0.70
    answer_relevancy: 0.65
    context_recall: 0.65
  regression_tolerance: 0.05

versions:
  v1:
    prompt_file: configs/prompt_v1.txt
    description: "Original detailed prompt (10 lines)"
  v2:
    prompt_file: configs/prompt_v2.txt
    description: "Shortened prompt for lower latency (4 lines)"
