name: PR Fast Gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  fast-tests:
    name: "Unit + Integration Tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Index knowledge base
        run: python scripts/index_knowledge.py

      - name: Run fast tests
        run: pytest tests/unit/ tests/integration/ -v --tb=short

      - name: Lint with ruff
        run: ruff check .
