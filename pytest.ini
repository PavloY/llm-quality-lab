[pytest]
testpaths = tests
python_files = test_*.py
python_functions = test_*
asyncio_mode = auto
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(name)s] %(levelname)s: %(message)s
log_cli_date_format = %H:%M:%S

markers =
    fast: unit + integration tests (no LLM, no cost)
    quality: Ragas quality metrics (requires LLM)
    safety: adversarial safety tests (requires LLM)
